    #loading-screen {

      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F091A 0%, #1a1035 50%, #0F091A 100%);

    }

      width: 120px;

      border-radius: 28px;

      margin-bottom: 32px;

      height: 100%;

    }

    #loading-screen h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #FAFAFC, #D4849A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #loading-screen p {
      font-size: 15px;
      color: #8A8A9E;
      margin: 0 0 48px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(124, 92, 191, 0.2);
      border-top-color: #7C5CBF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

  </style>

  <!-- Add notification permission request script -->
  <script>
    // Request notification permission
    async function requestNotificationPermission() {
      if ('Notification' in window) {
        const permission = await Notification.requestPermission();
        return permission;
      }
      return 'denied';
    }

    // Check notification permission status
    function getNotificationPermission() {
      if ('Notification' in window) {
        return Notification.permission;
      }
      return 'denied';
    }

    // Make functions globally available
    window.requestNotificationPermission = requestNotificationPermission;
    window.getNotificationPermission = getNotificationPermission;
  </script>

  <script>
    // Force service worker to update on every visit
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var registration of registrations) {
          registration.update();
        }
      });

      // When a new service worker takes over, reload to get fresh content
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
  </script>
