  <script>
    // PWA update banner: when a new build is deployed, detect the freshly
    // installed service worker and invite the user to reload, instead of
    // force-reloading mid-task (which could interrupt an order, a form, etc.).
    (function () {
      if (!('serviceWorker' in navigator)) return;

      function showUpdateBanner() {
        if (document.getElementById('app-update-banner')) return;
        var style = document.createElement('style');
        style.textContent =
          '#app-update-banner{position:fixed;left:50%;bottom:24px;' +
          'transform:translateX(-50%) translateY(160%);display:flex;align-items:center;' +
          'gap:14px;padding:12px 14px 12px 20px;border-radius:14px;background:#1a1035;' +
          'color:#FAFAFC;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;' +
          'font-size:14px;box-shadow:0 10px 40px rgba(0,0,0,.45);' +
          'border:1px solid rgba(124,92,191,.45);z-index:2147483647;' +
          'transition:transform .35s cubic-bezier(.2,.8,.2,1);max-width:calc(100vw - 32px)}' +
          '#app-update-banner.app-update-banner--in{transform:translateX(-50%) translateY(0)}' +
          '#app-update-banner .aub-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}' +
          '#app-update-banner .aub-reload{cursor:pointer;border:0;border-radius:9px;' +
          'padding:8px 16px;font-weight:600;font-size:14px;background:#7C5CBF;color:#fff}' +
          '#app-update-banner .aub-reload:hover{background:#8d6fd0}' +
          '#app-update-banner .aub-close{cursor:pointer;border:0;background:transparent;' +
          'color:#8A8A9E;font-size:20px;line-height:1;padding:0 4px}' +
          '#app-update-banner .aub-close:hover{color:#FAFAFC}';
        document.head.appendChild(style);

        var bar = document.createElement('div');
        bar.id = 'app-update-banner';
        bar.setAttribute('role', 'status');
        bar.innerHTML =
          '<span class="aub-text">Hay una nueva versión disponible</span>' +
          '<button type="button" class="aub-reload">Actualizar</button>' +
          '<button type="button" class="aub-close" aria-label="Cerrar">×</button>';
        document.body.appendChild(bar);
        requestAnimationFrame(function () { bar.classList.add('app-update-banner--in'); });

        bar.querySelector('.aub-reload').addEventListener('click', function () {
          window.location.reload();
        });
        bar.querySelector('.aub-close').addEventListener('click', function () {
          bar.classList.remove('app-update-banner--in');
          setTimeout(function () { if (bar.parentNode) bar.remove(); }, 350);
        });
      }

      function watchRegistration(reg) {
        if (!reg) return;
        // A worker already waiting from a prior check (controller present => it
        // is an update, not the initial install).
        if (reg.waiting && navigator.serviceWorker.controller) showUpdateBanner();
        reg.addEventListener('updatefound', function () {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function () {
            // 'installed' + an existing controller means a NEW build is ready
            // (a fresh first install has no controller yet, so it stays silent).
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner();
            }
          });
        });
      }

      navigator.serviceWorker.ready.then(watchRegistration);

      // Proactively poll for a new build now, periodically, and on tab focus.
      function checkForUpdates() {
        navigator.serviceWorker.ready
          .then(function (reg) { return reg.update(); })
          .catch(function () {});
      }
      checkForUpdates();
      setInterval(checkForUpdates, 60 * 1000);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') checkForUpdates();
      });
    })();
  </script>
